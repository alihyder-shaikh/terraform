apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        workload: backend
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/exalate-project-492211/backend-repo/backend:v2
          ports:
            - containerPort: 3000
